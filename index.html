<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curious Minds | Learning Simplified</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="#" class="logo" data-page="Home">
           
            <img src="Images/logo.png" class="logo" data-page="Home" alt="Logo">
            Curious Minds
        </a>

        <i class='bx bx-menu' id="menu-icon"></i>

        <nav>
            <a href="#" class="nav-link" data-page="Home">Home</a>
            <a href="#" class="nav-link" data-page="About">About</a>
            <div class="courses-dropdown">
                <a href="#" class="nav-link" data-page="Maths">Maths <i class='bx bxs-chevron-down'></i></a>
                <div class="dropdown-menu">
                    <a href="#" onclick="loadTests('Beginner')">Beginner</a>
                    <a href="#" onclick="loadTests('Competent')">Competent</a>
                    <a href="#" onclick="loadTests('Expert')">Expert</a>
                </div>
            </div>
            <a href="#" class="nav-link" data-page="Science">Science</a>
            <a href="#" class="nav-link" data-page="Resources">Resources</a>
            <a href="#" class="nav-link" data-page="Contact">Contact</a>
        </nav>

        <div class="user-auth">
            <button class="login-btn-modal">Login</button>
            
            <div class="profile-box">
                <div class="avatar-circle">U</div>
                <div class="dropdown">
                    <button id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1 id="hero-text">Hey Buddy!</h1>
    </section>

    <div class="auth-modal">
        <span class="close-btn-modal"><i class='bx bx-x'></i></span>
        
        <div class="form-box login">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>Don't have an account? <a class="register-link">Register</a></p>
            </form>
        </div>

        <div class="form-box register">
            <h2>Registration</h2>
            <form id="regForm">
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>Already have an account? <a class="login-link">Login</a></p>
            </form>
        </div>

        <div class="form-box forgot">
            <h2>Reset Password</h2>
            <form id="forgotForm">
                <p style="margin-bottom: 20px;">Enter your email to receive a reset link.</p>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <button type="submit" class="btn">Send Link</button>
                <p><a class="login-link">Back to Login</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
